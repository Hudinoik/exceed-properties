<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Brand background: deep navy with subtle gold inner border -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2D42"/>
      <stop offset="100%" stop-color="#0F1E2E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4B370"/>
      <stop offset="100%" stop-color="#B8924A"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="11" fill="url(#bg)"/>
  <rect x="2.5" y="2.5" width="59" height="59" rx="9" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <!-- Fancy serif "E" — Didot-like, with thick top/bottom serifs and a delicate middle bar -->
  <text x="32" y="48"
        font-family="Georgia, 'Didot', 'Times New Roman', serif"
        font-size="46"
        font-weight="700"
        font-style="italic"
        text-anchor="middle"
        fill="url(#gold)">E</text>
  <!-- Decorative underline accent under the E -->
  <line x1="20" y1="53" x2="44" y2="53" stroke="url(#gold)" stroke-width="1.2" opacity="0.7"/>
  <circle cx="32" cy="53" r="1.4" fill="#D4B370"/>
</svg>
